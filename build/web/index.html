<style>
  #splash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fff;
  color: #007bff;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  font-size: 1.5rem;
  z-index: 9999;
}
#logo {
    display: block;
    margin: 0 auto;
  }
  @media (min-aspect-ratio: 1/1) {
    #logo {
      width: min(calc(100vh / 2.1), 350px);
      height: min(calc(100vh / 2.1), 350px);
    }
  }
  @media (max-aspect-ratio: 1/1) {
    #logo {
      width: min(calc(100vw / 1.3), 350px);
      height: min(calc(100vw / 1.3), 350px);
    }
  }
</style>

</div>
<script>
  window.addEventListener("flutter-first-frame", function () {
    document.getElementById("splash").style.display = "none";
  });
</script>
