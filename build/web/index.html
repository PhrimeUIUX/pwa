  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #FFFFFF;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body style="margin:0; padding:0; overflow:hidden; background-color:#ffffff;">
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  
<script>
(function() {
  const doc = document;
  const root = doc.documentElement;

  function requestFS() {
    if (root.requestFullscreen) return root.requestFullscreen();
    if (root.webkitRequestFullscreen) return root.webkitRequestFullscreen();
    if (root.msRequestFullscreen) return root.msRequestFullscreen();
  }

  function bindFullscreenEvents() {
    const ask = () => {
      requestFS()?.catch(err => console.warn("Fullscreen failed:", err));
    };
    const opts = { once: true, passive: false };

    // Mouse + Touch + Pointer + Keyboard
    window.addEventListener('click', ask, opts);
    window.addEventListener('touchend', ask, opts);
    window.addEventListener('pointerup', ask, opts);
    window.addEventListener('keydown', ask, opts);
  }

  // Re-bind if fullscreen exits
  function onFSChange() {
    const fsEl = doc.fullscreenElement ||
                 doc.webkitFullscreenElement ||
                 doc.msFullscreenElement;
    if (!fsEl) bindFullscreenEvents();
  }

  doc.addEventListener('fullscreenchange', onFSChange);
  doc.addEventListener('webkitfullscreenchange', onFSChange);
  doc.addEventListener('MSFullscreenChange', onFSChange);

  bindFullscreenEvents();
})();

</script>
