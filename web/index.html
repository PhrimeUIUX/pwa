    <script>
    (function () {
      const NEW_DOMAIN = "https://ppc-toda.com";
      if (location.hostname !== "ppc-toda.com") {
      const target = NEW_DOMAIN + location.pathname + location.search + location.hash;
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (reg) {
              reg.unregister();
            });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function (keys) {
            keys.forEach(function (key) {
              caches.delete(key);
            });
          });
        }
        window.location.replace(target);
      }
    })();
  </script>
