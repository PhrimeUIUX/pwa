<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Base & Charset -->
    <base href="$FLUTTER_BASE_HREF">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">

    <!-- App Info -->
    <title>PPC TODA (Beta)</title>
    <meta name="description" content="PPC TODA (Beta)">

    <!-- Force Mobile View -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

    <!-- Mobile App Capable -->
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="PPC TODA (Beta)"/>

    <!-- Firebase (for Web Push) -->
    <meta name="firebase-messaging-sender-id" content="462080229186">

    <!-- Theme Colors -->
    <meta name="theme-color" content="#ffffff"/>
    <meta name="theme-color" content="transparent" media="(prefers-color-scheme: light)"/>
    <meta name="theme-color" content="transparent" media="(prefers-color-scheme: dark)"/>

    <!-- Icons -->
    <link rel="apple-touch-icon" href="icons/Icon-192.png">
    <link rel="icon" type="image/png" href="favicon.png"/>
    <link rel="manifest" href="manifest.json">

    <!-- Google Sign-In -->
    <meta name="google-signin-client_id"
          content="462080229186-560vcpm1uqvlc0pt5tl1qk5158lpd51h.apps.googleusercontent.com">
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Google Maps -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAZ_QLjsiFZnrZr33sCqW-SlTtkIV7PTeM&libraries=marker"></script>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style/indexstyle.css?v1.0.0+32"/>

    <!-- Splash Screen Style -->
    <style>
    #splash {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #fff;
      color: #007bff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      font-size: 1.5rem;
      z-index: 9999;
    }
    #logo { display: block; margin: 0 auto; }
    @media (min-aspect-ratio: 1/1) {
      #logo { width: min(calc(100vh / 2.1), 350px); height: min(calc(100vh / 2.1), 350px); }
    }
    @media (max-aspect-ratio: 1/1) {
      #logo { width: min(calc(100vw / 1.3), 350px); height: min(calc(100vw / 1.3), 350px); }
    }

    </style>
</head>

<body style="margin:0; padding:0; overflow:hidden; background-color:#ffffff;">
<!-- Splash Screen -->
<div id="splash">
    <img id="logo" src="https://storage.googleapis.com/ppc_toda_app/splash.png"
         alt="PPC TODA Logo"/>
</div>

<!-- End Splash -->
<script>
    window.addEventListener("flutter-first-frame", function () {
      document.getElementById("splash").style.display = "none";
    });

</script>

<!-- FCM Service Worker -->
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/firebase-messaging-sw.js")
      .then(function (registration) {
        console.log("Service Worker registered with scope:", registration.scope);
      })
      .catch(function (err) {
        console.error("Service Worker registration failed:", err);
      });
  }

</script>

<!-- Flutter Bootstrap -->
<script src="flutter_bootstrap.js" async></script>
</body>
</html>
